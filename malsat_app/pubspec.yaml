name: malsat_app
description: "MalSat - Livestock marketplace for Kyrgyzstan"
publish_to: 'none'
version: 1.4.1+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1

  # Storage
  flutter_secure_storage: ^9.2.4

  # UI
  cached_network_image: ^3.4.1
  pinput: ^5.0.1
  url_launcher: ^6.3.1
  lucide_icons: ^0.257.0

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Environment
  flutter_dotenv: ^5.2.1

  # Image picker
  image_picker: ^1.1.2
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.0.6
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - .env
    - lib/core/i18n/dictionaries/
