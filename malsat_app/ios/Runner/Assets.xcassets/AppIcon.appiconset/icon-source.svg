<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    MalSat app icon v2
    Bold custom "M" wordmark on a brand-green radial gradient.
    Letterform built as a single path with strong diagonal cuts
    to stay legible at 20×20.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#52B788" />
      <stop offset="40%" stop-color="#2D6A4F" />
      <stop offset="100%" stop-color="#1B4332" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="8" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)" />

  <!--
    Bold "M" letterform, centered.
    Geometry: 4 vertical stems + 2 diagonal middle strokes meeting at center.
    Target visual height ~ 540px, stem thickness ~ 145px.
    Canvas center: 512,512. Letter spans roughly x[220..804], y[250..774].
  -->
  <g filter="url(#soft)" fill="#FFFFFF">
    <path d="
      M 220 250
      L 365 250
      L 512 510
      L 659 250
      L 804 250
      L 804 774
      L 672 774
      L 672 490
      L 555 690
      L 469 690
      L 352 490
      L 352 774
      L 220 774
      Z
    " />
  </g>

  <!-- Gold accent dot — bottom right, signals verified/premium marketplace -->
  <circle cx="812" cy="812" r="42" fill="#E0B547" opacity="0.95" />
</svg>
